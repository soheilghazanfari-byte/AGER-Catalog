<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AGER Catalog Builder</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="app">

    <aside class="sidebar">

        <h1>AGER</h1>

        <p>Catalog Builder</p>

        <hr>

        <label>نام مدل</label>

        <input
            type="text"
            id="modelName"
            placeholder="مثلاً ویو">

        <label>جنس</label>

    <select id="material">

    <option>استیل 304 دست ساز</option>

    <option>استیل 304 پرسی</option>

    <option>ABS/استیل</option>

    <option>برنجی</option>

</select>
<label>سایزها</label>

<div class="sizes">

<label><input type="checkbox" value="10×10">10×10</label>

<label><input type="checkbox" value="30">30</label>

<label><input type="checkbox" value="40">40</label>

<label><input type="checkbox" value="50">50</label>

<label><input type="checkbox" value="60">60</label>

<label><input type="checkbox" value="70">70</label>

<label><input type="checkbox" value="80">80</label>

<label><input type="checkbox" value="90">90</label>

<label><input type="checkbox" value="100">100</label>

<label><input type="checkbox" value="110">110</label>

<label><input type="checkbox" value="120">120</label>

</div>
        <label>عکس اصلی</label>

        <input
            type="file"
            id="mainImage"
            accept="image/*">

        <label>عکس محصول</label>

        <input
            type="file"
            id="productImage"
            accept="image/*">

        <button>

ساخت کاتالوگ

        </button>

    </aside>



    <main class="workspace">

        <div class="page">

            <div class="brand">

AGER

            </div>

            <div
                class="hero"
                id="hero">

                عکس اصلی

            </div>

            <div class="bottom">

                <div
                    class="thumb"
                    id="thumb">

                    عکس محصول

                </div>

                <div class="details">

                    <h2 id="previewName">

نام مدل

                    </h2>

                    <p id="previewMaterial">

استیل 304 دست ساز

                    </p>

                    <p>

دارای سوپاپ (سوسکگیر)

                    </p>

                    <p>

۱۰×۱۰

۳۰

۴۰

۵۰

۶۰

۷۰

۸۰

۹۰

۱۰۰

۱۱۰

۱۲۰

                    </p>

                </div>

            </div>

        </div>

    </main>

</div>

<script src="js/app.js"></script>

</body>

</html>
